<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panacea — Reducing gender technological bias</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #634A45;
      --surface: #AE5969;
      --surface-2: #c87282;
      --border: rgba(23, 4, 4, 0.07);
      --border-2: rgba(255,255,255,0.13);
      --text: #ffffff;
      --muted: #ffffff;
      --accent: #c87282;
      --accent-dim: rgba(110,231,183,0.12);
      --accent-border: rgb(0, 255, 60);
      --warn: #cb9816;
      --warn-dim: rgba(251,191,36,0.1);
      --danger: #ff0000;
      --danger-dim: rgba(248,113,113,0.1);
      --safe: rgb(0, 255, 60);
      --safe-dim: rgba(52,211,153,0.1);
      --flagged: #fbbf24;
      --flagged-dim: rgba(251,191,36,0.1);
      --blocked: #e21313;
      --blocked-dim: rgba(248,113,113,0.1);
     
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-mark svg { width: 18px; height: 18px; }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    header span {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: auto;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
      height: calc(100vh - 65px);
    }

    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .upload-zone {
      margin: 1.25rem 1.5rem;
      border: 1.5px dashed var(--border-2);
      border-radius: 10px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent-border);
      background: var(--accent-dim);
    }

    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }

    .upload-zone .icon {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .upload-zone p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .upload-zone .filename {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      margin-top: 0.4rem;
    }

    .upload-btn {
      margin: 0 1.5rem 1rem;
      width: calc(100% - 3rem);
      padding: 0.65rem;
      background: var(--accent);
      color: #0d0f12;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .upload-btn:hover { opacity: 0.9; }
    .upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 1.5rem 1rem;
    }

    .stat-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem;
      text-align: center;
    }

    .stat-card .num {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
    }

    .stat-card .lbl {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .stat-card.safe .num { color: var(--safe); }
    .stat-card.flagged .num { color: var(--flagged); }
    .stat-card.blocked .num { color: var(--blocked); }

    .chunks-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 1rem 1rem;
    }

    .chunks-list h3 {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.5rem 0.5rem 0.5rem;
    }

    .chunk-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      margin-bottom: 6px;
      font-size: 0.75rem;
    }

    .chunk-item .chunk-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .chunk-id {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
    }

    .badge {
      font-size: 0.6rem;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-left: auto;
    }

    .badge.safe { background: var(--safe-dim); color: var(--safe); }
    .badge.flagged { background: var(--flagged-dim); color: var(--flagged); }
    .badge.blocked { background: var(--blocked-dim); color: var(--blocked); }

    .chunk-preview {
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .score-bar {
      margin-top: 5px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    .score-fill.safe { background: var(--safe); }
    .score-fill.flagged { background: var(--flagged); }
    .score-fill.blocked { background: var(--blocked); }

    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 0.75rem;
    }

    .empty-state .big-icon {
      font-size: 2.5rem;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.875rem;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }

    .message {
      max-width: 680px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 12px 12px 3px 12px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .message.assistant {
      align-self: flex-start;
      width: 100%;
    }

    .answer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .answer-body {
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text);
    }

    .answer-meta {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.72rem;
    }

    .meta-group { display: flex; flex-direction: column; gap: 4px; }

    .meta-label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.62rem;
    }

    .meta-chips { display: flex; flex-wrap: wrap; gap: 4px; }

    .chip {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .chip.source { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
    .chip.blocked { background: var(--blocked-dim); color: var(--blocked); border: 1px solid rgba(248,113,113,0.3); }

    .input-area {
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 44px;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    .input-area textarea:focus { border-color: var(--border-2); }
    .input-area textarea::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .send-btn svg { width: 18px; height: 18px; color: #0d0f12; }

    .loading-dots {
      display: flex; gap: 4px; padding: 1rem 1.25rem;
    }

    .loading-dots span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: dot 1.2s infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%, 60%, 100% { opacity: 0.2; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    .toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: var(--text);
      max-width: 280px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      animation: toastIn 0.3s ease;
      z-index: 100;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .toast.success { border-left: 3px solid var(--accent); }
    .toast.error   { border-left: 3px solid var(--danger); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">
  <img src="{{ url_for('static', filename='logo.png') }}" alt="Panacea Logo">
  </div>
  <h1>Panacea</h1>
  <span></span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Dataset</h2>
    </div>

    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".txt" />
      <span class="icon">📄</span>
      <p>Drop a <strong>.txt</strong> file here<br/>or click to browse</p>
      <div class="filename" id="fileName"></div>
    </div>

    <button class="upload-btn" id="uploadBtn" disabled>Scan for bias</button>

    <div class="stats-grid" id="statsGrid" style="display:none">
      <div class="stat-card safe">
        <div class="num" id="statSafe">0</div>
        <div class="lbl">Safe</div>
      </div>
      <div class="stat-card flagged">
        <div class="num" id="statFlagged">0</div>
        <div class="lbl">Flagged</div>
      </div>
      <div class="stat-card blocked">
        <div class="num" id="statBlocked">0</div>
        <div class="lbl">Blocked</div>
      </div>
    </div>

    <div class="chunks-list" id="chunksList"></div>
  </aside>

  <!-- Main chat -->
  <main class="main">
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
       <div class="big-icon">
        <img src="{{ url_for('static', filename='ewb.png') }}" alt="icon">

        <p>Upload a dataset to begin.<br/>Then ask questions — biased chunks will be automatically filtered.</p>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="questionInput"
        placeholder="Ask a question about your dataset…"
        rows="1"
        disabled
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </main>
</div>

<script>
  const API = '';  
  let selectedFile = null;
  let datasetLoaded = false;

  // --- DOM refs ---
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const uploadBtn = document.getElementById('uploadBtn');
  const statsGrid = document.getElementById('statsGrid');
  const chunksList = document.getElementById('chunksList');
  const chatArea = document.getElementById('chatArea');
  const emptyState = document.getElementById('emptyState');
  const questionInput = document.getElementById('questionInput');
  const sendBtn = document.getElementById('sendBtn');

  // --- File selection ---
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) selectFile(fileInput.files[0]);
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
  });

  function selectFile(file) {
    if (!file.name.endsWith('.txt')) { showToast('Only .txt files are supported.', 'error'); return; }
    selectedFile = file;
    fileName.textContent = file.name;
    uploadBtn.disabled = false;
  }

  // --- Upload ---
 uploadBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  uploadBtn.disabled = true;
  uploadBtn.textContent = 'Scanning…';

  const formData = new FormData();
  formData.append('file', selectedFile);

  try {
    const res = await fetch(`${API}/upload`, {
      method: 'POST',
      body: formData
    });

    const raw = await res.text();
    console.log("UPLOAD RAW RESPONSE:", raw);

    let data;
    try {
      data = JSON.parse(raw);
    } catch (e) {
      throw new Error("Server did not return JSON. Response was: " + raw.slice(0, 300));
    }

    if (!res.ok) throw new Error(data.error || 'Upload failed');

    showToast(`${data.chunks_processed || 0} chunks scanned.`, 'success');

    if (data.status_summary) {
      renderStats(data.status_summary);
    }

    await loadChunks();
    enableChat();

  } catch (err) {
    showToast(err.message, 'error');
    console.error(err);
  } finally {
    uploadBtn.textContent = 'Scan for bias';
    uploadBtn.disabled = false;
  }
});

  function renderStats(summary) {
    document.getElementById('statSafe').textContent = summary.safe || 0;
    document.getElementById('statFlagged').textContent = summary.flagged || 0;
    document.getElementById('statBlocked').textContent = summary.blocked || 0;
    statsGrid.style.display = 'grid';
  }

  async function loadChunks() {
    const res = await fetch(`${API}/chunks`);
    const data = await res.json();
    chunksList.innerHTML = '<h3>Chunks</h3>';
    data.chunks.forEach(c => {
      const maxScore = 6;
      const pct = Math.min((c.bias_score / maxScore) * 100, 100);
      const el = document.createElement('div');
      el.className = 'chunk-item';
      el.innerHTML = `
        <div class="chunk-header">
          <span class="chunk-id">${c.chunk_id}</span>
          <span class="badge ${c.status}">${c.status}</span>
        </div>
        <div class="chunk-preview">${escHtml(c.preview)}</div>
        <div class="score-bar"><div class="score-fill ${c.status}" style="width:${pct}%"></div></div>
      `;
      chunksList.appendChild(el);
    });
  }

  function enableChat() {
    datasetLoaded = true;
    questionInput.disabled = false;
    sendBtn.disabled = false;
    questionInput.focus();
    emptyState.style.display = 'none';
  }

  // --- Chat ---
  questionInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });

  questionInput.addEventListener('input', () => {
    questionInput.style.height = 'auto';
    questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + 'px';
  });

  sendBtn.addEventListener('click', sendQuestion);

  async function sendQuestion() {
    const q = questionInput.value.trim();
    if (!q || !datasetLoaded) return;

    questionInput.value = '';
    questionInput.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', q);
    const loadingEl = appendLoading();

    try {
      const res = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });
      const data = await res.json();
      loadingEl.remove();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      appendAnswer(data);
    } catch (err) {
      loadingEl.remove();
      appendMessage('user', `Error: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      questionInput.focus();
    }
  }

  function appendMessage(role, text) {
    emptyState.style.display = 'none';
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function appendLoading() {
    emptyState.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.innerHTML = `<div class="answer-card"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function appendAnswer(data) {
    const sourceChips = (data.sources_used || []).map(s =>
      `<span class="chip source">${s}</span>`).join('');
    const blockedChips = (data.chunks_blocked || []).map(s =>
      `<span class="chip blocked">${s}</span>`).join('');

    const metaHtml = `
      <div class="answer-meta">
        ${sourceChips ? `<div class="meta-group">
          <div class="meta-label">Sources used</div>
          <div class="meta-chips">${sourceChips}</div>
        </div>` : ''}
        ${blockedChips ? `<div class="meta-group">
          <div class="meta-label">Blocked (biased)</div>
          <div class="meta-chips">${blockedChips}</div>
        </div>` : ''}
      </div>
    `;

    const div = document.createElement('div');
    div.className = 'message assistant';
    div.innerHTML = `
      <div class="answer-card">
        <div class="answer-body">${escHtml(data.answer)}</div>
        ${(data.sources_used?.length || data.chunks_blocked?.length) ? metaHtml : ''}
      </div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // --- Toast ---
  function showToast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
